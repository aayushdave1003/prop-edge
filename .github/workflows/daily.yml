name: daily-pipeline

# Always-on replacement for the local Mac cron: generates picks daily even when
# the laptop is off. Runs the same scripts/daily.sh against the Railway DB.
#
# Scheduling: ONE daily UTC cron (no DST dual-cron). GitHub bills every triggered
# run — including a dual-cron's gated-out twin — rounded up to a full minute, so
# the old PDT+PST pair burned ~30 wasted min/month here. A single cron at 14:00
# UTC fires once/day: 7 AM in summer (PDT), 6 AM in winter (PST). An hour's
# seasonal drift on a morning batch is immaterial. Manual dispatch still works.
on:
  schedule:
    - cron: "0 14 * * *"   # 7 AM PDT / 6 AM PST
  workflow_dispatch: {}

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    # The full pipeline (4 sports × schedules/box-scores/features + settle +
    # predict) runs ~35-40 min; 45 was too tight and a slow API timed out
    # mid-predict, before picks/Discord. 90 gives headroom.
    timeout-minutes: 90
    env:
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PRIZEPICKS_PROXY: ${{ secrets.PRIZEPICKS_PROXY }}
      # Dead-man's-switch: daily.sh pings this only on a clean run. Unset => no
      # ping step (harmless). Set the HEALTHCHECK_PING_URL secret to activate.
      HEALTHCHECK_PING_URL: ${{ secrets.HEALTHCHECK_PING_URL }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: System deps (libgomp for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: bash scripts/daily.sh
