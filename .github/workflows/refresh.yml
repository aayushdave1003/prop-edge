name: intraday-refresh

# Intraday injury + starter refreshes (lightweight — no model inference).
# PrizePicks LINES are deliberately NOT refreshed here: PrizePicks blocks
# datacenter IPs, so the line scrape runs on the Mac (scripts/scrape_lines.sh).
# Injuries + starters use ESPN/MLB feeds that work fine from the cloud.
#
# DST-safe: GitHub cron is UTC and doesn't follow DST, so each slot has a PDT and
# a PST cron and the gate lets exactly one through, keyed on WHICH cron fired
# (github.event.schedule) + the current DST offset — NOT the run hour, since
# GitHub delivers scheduled events 1–2h late. Manual dispatch always runs.
on:
  schedule:
    - cron: "0 17 * * *"   # 10 AM PDT
    - cron: "0 18 * * *"   # 10 AM PST
    - cron: "0 23 * * *"   #  4 PM PDT
    - cron: "0 0 * * *"    #  4 PM PST
    - cron: "0 2 * * *"    #  7 PM PDT
    - cron: "0 3 * * *"    #  7 PM PST
  workflow_dispatch: {}

concurrency:
  group: intraday-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PRIZEPICKS_PROXY: ${{ secrets.PRIZEPICKS_PROXY }}
      LOG_LEVEL: INFO
    steps:
      - name: Gate slots (DST-safe, delay-independent)
        id: gate
        env:
          SCHED: ${{ github.event.schedule }}
          EVENT: ${{ github.event_name }}
        run: |
          OFFSET=$(TZ=America/Los_Angeles date +%z)   # -0700 PDT, -0800 PST
          echo "event=$EVENT schedule='$SCHED' pacific_offset=$OFFSET"
          RUN=no
          if [ "$EVENT" = "workflow_dispatch" ]; then
            RUN=yes
          else
            case "$SCHED" in
              "0 17 * * *"|"0 23 * * *"|"0 2 * * *") [ "$OFFSET" = "-0700" ] && RUN=yes ;;  # PDT slots
              "0 18 * * *"|"0 0 * * *"|"0 3 * * *")  [ "$OFFSET" = "-0800" ] && RUN=yes ;;  # PST slots
            esac
          fi
          [ "$RUN" = "no" ] && echo "Skipping — cron doesn't match current DST."
          echo "run=$RUN" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'yes'
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'yes'
        with:
          python-version: "3.13"
          cache: pip
      - if: steps.gate.outputs.run == 'yes'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - if: steps.gate.outputs.run == 'yes'
        run: pip install -r requirements.txt
      - name: Refresh lines (via proxy) + injuries + starters
        if: steps.gate.outputs.run == 'yes'
        run: |
          # PrizePicks lines only when a residential proxy is configured (it
          # blocks datacenter IPs); otherwise the Mac cron owns scraping.
          if [ -n "${PRIZEPICKS_PROXY:-}" ]; then
            python -m props.ingest.prizepicks || echo "WARN: prizepicks scrape failed"
          fi
          python -m props.ingest.injuries || echo "WARN: injuries failed"
          python -m props.picks.confirm_starters || echo "WARN: confirm_starters failed"
          # Capture the sharp market's near-game prob for open picks (CLV close).
          # Runs each intraday slot; the last one before tip-off is ~the close.
          if [ -n "${ODDS_API_KEY:-}" ]; then
            python -m props.picks.capture_sharp_close || echo "WARN: sharp close capture failed"
          fi
