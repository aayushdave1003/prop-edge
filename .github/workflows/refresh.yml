name: intraday-refresh

# Intraday injury + starter refreshes (lightweight — no model inference).
# PrizePicks LINES are deliberately NOT refreshed here unless a residential proxy
# is configured (PrizePicks blocks datacenter IPs). Injuries + starters use
# ESPN/MLB feeds that work fine from the cloud.
#
# Scheduling: ONE UTC cron per slot (no DST dual-cron). GitHub bills every
# triggered run — including a dual-cron's gated-out twin, rounded up to a full
# minute — so the old PDT+PST pairs burned ~90 wasted min/month here. Single
# crons fire once/slot: the listed times are PDT; in winter (PST) they land an
# hour earlier (9 AM / 3 PM / 6 PM), which is fine for refreshes. Manual dispatch
# still works.
on:
  schedule:
    - cron: "0 17 * * *"   # 10 AM PDT / 9 AM PST
    - cron: "0 23 * * *"   #  4 PM PDT / 3 PM PST
    - cron: "0 2 * * *"    #  7 PM PDT / 6 PM PST
  workflow_dispatch: {}

concurrency:
  group: intraday-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      PRIZEPICKS_PROXY: ${{ secrets.PRIZEPICKS_PROXY }}
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - run: pip install -r requirements.txt
      - name: Refresh lines (via proxy) + injuries + starters
        run: |
          # PrizePicks lines only when a residential proxy is configured (it
          # blocks datacenter IPs); otherwise the Mac cron owns scraping.
          if [ -n "${PRIZEPICKS_PROXY:-}" ]; then
            python -m props.ingest.prizepicks || echo "WARN: prizepicks scrape failed"
          fi
          python -m props.ingest.injuries || echo "WARN: injuries failed"
          python -m props.picks.confirm_starters || echo "WARN: confirm_starters failed"
          # Capture the sharp market's near-game prob for open picks (CLV close).
          # Runs each intraday slot; the last one before tip-off is ~the close.
          if [ -n "${ODDS_API_KEY:-}" ]; then
            python -m props.picks.capture_sharp_close || echo "WARN: sharp close capture failed"
          fi
