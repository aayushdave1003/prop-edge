name: ci

# Run the unit suite on every push / PR so the pure logic (settle, de-vig,
# per-category cutoffs, ESPN stat parsing, HTML sanitizer) can't silently
# regress. No DB or secrets needed — tests are DB-independent; a dummy
# DATABASE_URL just satisfies settings at import time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "postgresql+psycopg://ci:ci@localhost:5432/ci"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: System deps (libgomp for LightGBM)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgomp1
      - name: Install deps
        run: |
          pip install -r requirements.txt
          # Pinned: unpinned dev tools mean a new ruff/mypy release silently
          # breaks main (mypy 2.1.0's stricter json= arg-type check did exactly
          # that). Bump deliberately. These are the versions verified green.
          pip install pytest==9.1.1 flake8==7.3.0 mypy==2.1.0 ruff==0.15.18
      - name: Byte-compile (syntax check)
        run: python -m compileall -q props ui
      - name: Lint — undefined names / use-before-assign / redefinition (NameError-class bugs)
        run: python -m flake8 --select=F821,F823,F811 props ui
      - name: Ruff — pyflakes (unused imports/names; see [tool.ruff.lint])
        run: ruff check props ui
      - name: Type check — scoped gate (props/utils + props/ops; see [tool.mypy])
        run: python -m mypy
      - name: Run tests
        run: python -m pytest tests/ -q

  web:
    # Frontend gate: typecheck (tsc), lint (eslint), unit tests (vitest), and a
    # production build — so the board can't ship a type error, a lint break, or a
    # broken bundle. Mirrors the local `npm run lint / test / build`.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Unit tests (vitest)
        run: npm test
      - name: Build (tsc + vite)
        run: npm run build

  docker:
    # Build the board image so a broken Dockerfile.board is caught before a
    # deploy. PR / manual only — a direct push to main is built by Railway on
    # deploy anyway, so building it here too would just burn Actions minutes.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Build board image (no push)
        run: docker build -f Dockerfile.board -t prop-edge-board:ci .
