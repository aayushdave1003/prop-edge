name: db-backup

# Scheduled prod-DB snapshot. pg_dump (custom format, compressed) of the Railway
# Postgres, published as a private GitHub RELEASE asset — durable, no expiry, and
# (unlike Actions artifacts) NOT counted against the ~500 MB free artifact quota.
# The old 30-day-retention artifact path filled that quota (~3.2 GB of ~196 MB
# daily dumps) and silently started failing every upload — so there was no working
# backup. Releases fix that; we keep the last 14 and prune the rest.
#
# Restore:  gh release download db-backup-YYYY-MM-DD --repo aayushdave1003/prop-edge
#           then scripts/restore_db.sh on the .dump  (pg_restore, guarded).
#
# Offsite copy (P0.6): the release above lives entirely on GitHub — one blast
# radius. The optional S3/R2 step below ALSO pushes the same dump to S3-compatible
# object storage (AWS S3 or Cloudflare R2) for a genuinely separate blast radius.
# It's gated on BACKUP_S3_BUCKET: unset ⇒ skipped with a log line, the release
# path is unaffected. Secrets: BACKUP_S3_BUCKET, AWS_ACCESS_KEY_ID,
# AWS_SECRET_ACCESS_KEY, and (for R2 only) AWS_ENDPOINT_URL.
#
# A genuinely TESTED restore is not something this workflow can prove on its own —
# it needs the user to (1) add the secrets, (2) run scripts/restore_db.sh once
# against a throwaway scratch DB, from either `gh release download` or S3, and
# confirm pg_restore succeeds. Until that's done, treat the offsite copy as
# "present but unverified".
#
# pg_dump runs from postgres:18 so the client matches the server (Railway = PG 18).
# DATABASE_URL is the SQLAlchemy form (postgresql+psycopg://…); strip +psycopg for libpq.
on:
  schedule:
    - cron: "0 10 * * *"   # ~3 AM PT (10:00 UTC; a single daily snapshot, DST-agnostic)
  workflow_dispatch: {}

concurrency:
  group: db-backup
  cancel-in-progress: false

permissions:
  contents: write   # create/delete backup releases + tags

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RAILWAY_DATABASE_URL: ${{ secrets.RAILWAY_DATABASE_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      GH_TOKEN: ${{ github.token }}
      # Optional offsite (S3/R2) copy — all blank unless configured; see header.
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}   # set for Cloudflare R2
    steps:
      - uses: actions/checkout@v4

      - name: pg_dump → custom-format archive
        run: |
          set -euo pipefail
          URL="${RAILWAY_DATABASE_URL/+psycopg/}"   # postgresql+psycopg:// → postgresql://
          STAMP="$(date -u +%Y-%m-%d)"
          OUT="prop-edge-${STAMP}.dump"
          docker run --rm -e U="$URL" postgres:18 \
            sh -c 'pg_dump "$U" -Fc --no-owner --no-privileges' > "$OUT"
          SIZE=$(du -h "$OUT" | cut -f1)
          echo "wrote $OUT ($SIZE)"
          # Sanity: a real dump is not trivially small (custom-format header alone is tiny).
          BYTES=$(stat -c%s "$OUT")
          if [ "$BYTES" -lt 100000 ]; then
            echo "::error::dump suspiciously small ($BYTES bytes) — failing"; exit 1
          fi
          echo "OUT=$OUT" >> "$GITHUB_ENV"
          echo "STAMP=$STAMP" >> "$GITHUB_ENV"
          echo "SIZE=$SIZE" >> "$GITHUB_ENV"

      - name: Publish snapshot as a release asset
        run: |
          set -euo pipefail
          TAG="db-backup-${STAMP}"
          # Idempotent for same-day re-runs: replace an existing asset, else create.
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$OUT" --clobber
          else
            gh release create "$TAG" "$OUT" \
              --title "DB backup ${STAMP}" \
              --notes "pg_dump -Fc of prod Postgres · ${SIZE}" \
              --latest=false
          fi

      - name: Offsite copy → S3 / R2 (optional)
        run: |
          set -uo pipefail
          if [ -z "${BACKUP_S3_BUCKET:-}" ]; then
            echo "BACKUP_S3_BUCKET unset — skipping offsite S3/R2 upload (release copy still made)."
            exit 0
          fi
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "::warning::BACKUP_S3_BUCKET set but AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY missing — skipping offsite upload."
            exit 0
          fi
          # Same 'run the client in docker' pattern as pg_dump: no host aws install,
          # pinned image. --endpoint-url is passed only when AWS_ENDPOINT_URL is set
          # (R2); empty ⇒ real AWS S3. Key it by date under backups/ so it's easy to
          # list and lifecycle-expire on the bucket side.
          ENDPOINT_ARG=""
          [ -n "${AWS_ENDPOINT_URL:-}" ] && ENDPOINT_ARG="--endpoint-url $AWS_ENDPOINT_URL"
          echo "uploading $OUT → s3://$BACKUP_S3_BUCKET/backups/$OUT ${AWS_ENDPOINT_URL:+(endpoint $AWS_ENDPOINT_URL)}"
          if docker run --rm \
              -e AWS_ACCESS_KEY_ID -e AWS_SECRET_ACCESS_KEY \
              -e AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION:-us-east-1}" \
              -v "$PWD:/data" -w /data \
              amazon/aws-cli:latest \
              s3 cp "$OUT" "s3://$BACKUP_S3_BUCKET/backups/$OUT" $ENDPOINT_ARG; then
            echo "offsite upload ok"
          else
            # Don't fail the job: the GitHub release copy already succeeded above.
            echo "::warning::offsite S3/R2 upload failed — the GitHub release copy is intact; check bucket/creds/endpoint."
          fi

      - name: Prune old backup releases (keep last 14)
        run: |
          set -euo pipefail
          gh release list --limit 200 --json tagName --jq '.[].tagName' \
            | grep '^db-backup-' | sort -r | tail -n +15 \
            | while read -r tag; do
                echo "pruning $tag"
                gh release delete "$tag" --yes --cleanup-tag || true
              done

      - name: Alert on failure
        if: failure() && env.DISCORD_WEBHOOK_URL != ''
        run: |
          curl -s -H "Content-Type: application/json" \
            -d '{"content":"⚠️ **db-backup failed** — prop-edge nightly pg_dump/release did not complete. Check the Actions run."}' \
            "$DISCORD_WEBHOOK_URL" || true
